<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-boost 意見・アイデアボックス</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      background: white;
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    label .required { color: #ef4444; margin-left: 2px; }

    input, select, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    textarea { resize: vertical; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    .btn:hover { background: #3730a3; }

    .success {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
    }

    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .success h2 { font-size: 1.3rem; color: #111827; margin-bottom: 0.5rem; }
    .success p { color: #6b7280; font-size: 0.9rem; }

    .back-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.25rem;
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .note {
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
      margin-top: 1rem;
    }

    .loading { color: #6b7280; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="form-section">
      <div class="logo">
        <img src="logo.PNG" alt="A-boost" style="max-width:180px;margin-bottom:0.75rem;display:block;margin-left:auto;margin-right:auto">
        <h1 style="font-size:1.4rem;font-weight:700;color:#4f46e5;margin-bottom:0.3rem">意見・アイデアボックス</h1>
        <p style="font-size:0.85rem;color:#6b7280">自由に意見やアイデアを送ってください</p>
      </div>

      <div class="form-group">
        <label>名前<span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="山田 太郎">
      </div>

      <div class="form-group">
        <label>対象イベント</label>
        <select id="f-event">
          <option value="">なし（全体への意見）</option>
        </select>
      </div>

      <div class="form-group">
        <label>意見・アイデア<span class="required">*</span></label>
        <textarea id="f-text" rows="6" placeholder="自由に書いてください..."></textarea>
      </div>

      <button class="btn" onclick="submitOpinion()">送信する</button>
      <p class="note">内容はサークル幹部のみが確認します</p>
    </div>

    <div class="success" id="success-section">
      <div class="success-icon">✅</div>
      <h2>送信完了！</h2>
      <p>ありがとうございます。<br>大切に読ませていただきます。</p>
      <button class="back-btn" onclick="resetForm()">続けて送る</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCJqp4e8BMkEbOO3ErWXJiz0zx9J3pxl34",
      authDomain: "a-boost.firebaseapp.com",
      projectId: "a-boost",
      storageBucket: "a-boost.firebasestorage.app",
      messagingSenderId: "431608615443",
      appId: "1:431608615443:web:5fb112e76f2d6ef3b7e5e6",
      measurementId: "G-7TFBPDR74Q"
    };

    firebase.initializeApp(firebaseConfig);
    const fsdb = firebase.firestore();
    const dataRef = fsdb.collection('app').doc('data');

    // Load events into selector
    dataRef.get().then(snap => {
      if (!snap.exists) return;
      const events = (snap.data().events || []).sort((a, b) => new Date(a.date) - new Date(b.date));
      const sel = document.getElementById('f-event');
      events.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.id;
        const d = new Date(e.date + 'T00:00:00');
        opt.textContent = `${d.getMonth()+1}/${d.getDate()} ${e.title}`;
        sel.appendChild(opt);
      });
    });

    function submitOpinion() {
      const name = document.getElementById('f-name').value.trim();
      const text = document.getElementById('f-text').value.trim();
      if (!name) { alert('名前を入力してください'); return; }
      if (!text) { alert('意見・アイデアを入力してください'); return; }

      const opinion = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
        name,
        eventId: document.getElementById('f-event').value || null,
        text,
        createdAt: new Date().toISOString().slice(0, 10),
      };

      dataRef.get().then(snap => {
        const opinions = snap.exists ? (snap.data().opinions || []) : [];
        opinions.push(opinion);
        return dataRef.set({ opinions }, { merge: true });
      }).then(() => {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      }).catch(() => {
        alert('送信に失敗しました。もう一度お試しください。');
      });
    }

    function resetForm() {
      document.getElementById('f-name').value = '';
      document.getElementById('f-event').value = '';
      document.getElementById('f-text').value = '';
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('success-section').style.display = 'none';
    }
  </script>
</body>
</html>
