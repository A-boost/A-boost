<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会費管理 | A-boost</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--gray-50); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .header-bar {
      background: white; border-bottom: 1px solid var(--gray-200);
      padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); margin-bottom: 1.5rem;
    }
    .header-bar h1 { color: var(--primary); font-size: 1.2rem; margin: 0; }
    .paid   { color: var(--success); font-weight: 600; }
    .unpaid { color: var(--danger); }
    .check-cell { text-align: center; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
    .progress-bar { height: 10px; background: var(--gray-200); border-radius: 5px; overflow: hidden; margin-top: 0.4rem; }
    .progress-fill { height: 100%; background: var(--success); border-radius: 5px; transition: width 0.4s; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .sum-card { background: white; border-radius: 8px; padding: 0.9rem; text-align: center; border: 1px solid var(--gray-200); }
    .sum-val { font-size: 1.4rem; font-weight: 700; }
    .sum-lbl { font-size: 0.72rem; color: var(--gray-500); margin-top: 0.2rem; }
  </style>
</head>
<body>
  <div class="header-bar">
    <h1>⚡ A-boost</h1>
    <span style="color:var(--gray-500);font-size:0.8rem">会費支払い管理</span>
    <a href="index.html" style="margin-left:auto;font-size:0.8rem;color:var(--primary)">管理画面へ</a>
  </div>

  <div class="wrap">
    <div class="card" style="margin-bottom:1rem">
      <div class="form-grid">
        <div class="form-group">
          <label>期間</label>
          <select id="sel-period" onchange="render()">
            <option value="2026前期">2026年 前期</option>
            <option value="2026後期">2026年 後期</option>
            <option value="2025前期">2025年 前期</option>
            <option value="2025後期">2025年 後期</option>
          </select>
        </div>
        <div class="form-group">
          <label>会費金額（円）</label>
          <input type="number" id="fee-amount" value="3000" min="0" step="500" onchange="render()">
        </div>
      </div>
    </div>

    <div class="summary-grid" id="summary-grid">
      <div class="sum-card"><div class="sum-val paid"   id="cnt-paid">0</div><div class="sum-lbl">人 支払済</div></div>
      <div class="sum-card"><div class="sum-val unpaid" id="cnt-unpaid">0</div><div class="sum-lbl">人 未払い</div></div>
      <div class="sum-card"><div class="sum-val" id="amt-collected" style="color:var(--primary)">¥0</div><div class="sum-lbl">回収済み</div></div>
      <div class="sum-card"><div class="sum-val" id="amt-remain" style="color:var(--danger)">¥0</div><div class="sum-lbl">未回収</div></div>
    </div>

    <div class="card" style="margin-bottom:1rem;padding:0.9rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">
        <span style="font-size:0.8rem;color:var(--gray-500)">回収率</span>
        <span style="font-size:0.85rem;font-weight:600;color:var(--success)" id="rate-txt">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    </div>

    <div class="toolbar" style="margin-bottom:0.75rem">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">CSVエクスポート</button>
      <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;cursor:pointer;margin-left:auto">
        <input type="checkbox" id="show-unpaid-only" onchange="render()"> 未払いのみ表示
      </label>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>学年</th>
            <th>名前</th>
            <th class="check-cell">支払済</th>
            <th>支払日</th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody id="fee-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 備考編集モーダル -->
  <div id="note-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3>備考を編集</h3>
      <input type="hidden" id="note-member-id">
      <div class="form-group" style="margin-bottom:1rem">
        <label>備考</label>
        <textarea id="note-text" rows="3" placeholder="分割払い、立替など..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveNote()">保存</button>
        <button class="btn btn-outline" onclick="document.getElementById('note-modal').style.display='none'">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCJqp4e8BMkEbOO3ErWXJiz0zx9J3pxl34",
      authDomain: "a-boost.firebaseapp.com",
      projectId: "a-boost",
      storageBucket: "a-boost.firebasestorage.app",
      messagingSenderId: "431608615443",
      appId: "1:431608615443:web:5fb112e76f2d6ef3b7e5e6"
    });
    const db = firebase.firestore();
    const ref = db.collection('app').doc('data');

    let members = [], feeData = {};

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    ref.onSnapshot(snap => {
      if (!snap.exists) return;
      const d = snap.data();
      members = (d.members || []).sort((a, b) =>
        (a.grade || '').localeCompare(b.grade || '', 'ja') || (a.name || '').localeCompare(b.name || '', 'ja')
      );
      feeData = d.feeData || {};
      render();
    });

    function getPeriod() { return document.getElementById('sel-period').value; }
    function getFeeAmt() { return parseInt(document.getElementById('fee-amount').value) || 0; }

    function render() {
      const period = getPeriod();
      const feeAmt = getFeeAmt();
      const periodData = feeData[period] || {};
      const showUnpaidOnly = document.getElementById('show-unpaid-only').checked;

      let paidCount = 0;
      const rows = members.filter(m => {
        const isPaid = !!periodData[m.id];
        if (isPaid) paidCount++;
        return !showUnpaidOnly || !isPaid;
      });

      const total  = members.length;
      const unpaid = total - paidCount;
      const rate   = total ? Math.round(paidCount / total * 100) : 0;

      document.getElementById('cnt-paid').textContent    = paidCount;
      document.getElementById('cnt-unpaid').textContent  = unpaid;
      document.getElementById('amt-collected').textContent = '¥' + (paidCount * feeAmt).toLocaleString();
      document.getElementById('amt-remain').textContent   = '¥' + (unpaid    * feeAmt).toLocaleString();
      document.getElementById('rate-txt').textContent = rate + '%';
      document.getElementById('prog').style.width = rate + '%';

      document.getElementById('fee-body').innerHTML = rows.map(m => {
        const rec   = periodData[m.id];
        const paid  = !!rec;
        return `
          <tr>
            <td>${esc(m.grade) || '-'}</td>
            <td><strong>${esc(m.name)}</strong></td>
            <td class="check-cell">
              <input type="checkbox" ${paid ? 'checked' : ''} onchange="toggle('${m.id}', this.checked)">
            </td>
            <td>${paid ? rec.date : '<span style="color:var(--gray-500)">-</span>'}</td>
            <td>
              <span style="font-size:0.8rem;color:var(--gray-600)">${esc(rec?.note) || ''}</span>
              <button class="btn btn-outline btn-sm" style="margin-left:0.4rem" onclick="openNote('${m.id}','${esc(rec?.note||'')}')">編集</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function toggle(memberId, isPaid) {
      const period = getPeriod();
      const periodData = { ...(feeData[period] || {}) };
      if (isPaid) {
        periodData[memberId] = { ...(periodData[memberId] || {}), date: new Date().toISOString().slice(0, 10) };
      } else {
        delete periodData[memberId];
      }
      feeData[period] = periodData;
      ref.set({ feeData: { [period]: periodData } }, { merge: true });
    }

    function openNote(memberId, currentNote) {
      document.getElementById('note-member-id').value = memberId;
      document.getElementById('note-text').value = currentNote;
      document.getElementById('note-modal').style.display = 'flex';
    }

    function saveNote() {
      const memberId = document.getElementById('note-member-id').value;
      const note = document.getElementById('note-text').value.trim();
      const period = getPeriod();
      const periodData = { ...(feeData[period] || {}) };
      periodData[memberId] = { ...(periodData[memberId] || {}), note };
      feeData[period] = periodData;
      ref.set({ feeData: { [period]: periodData } }, { merge: true });
      document.getElementById('note-modal').style.display = 'none';
    }

    function exportCSV() {
      const period = getPeriod();
      const feeAmt = getFeeAmt();
      const periodData = feeData[period] || {};
      const rows = [['学年', '名前', '支払状況', '支払日', '備考']];
      members.forEach(m => {
        const rec = periodData[m.id];
        rows.push([m.grade || '', m.name, rec ? '支払済' : '未払い', rec?.date || '', rec?.note || '']);
      });
      const csv  = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = `会費管理_${period}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById('note-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('note-modal'))
        document.getElementById('note-modal').style.display = 'none';
    });
  </script>
</body>
</html>
