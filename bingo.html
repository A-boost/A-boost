<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビンゴ抽選 v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 340px;
      grid-template-areas:
        "header header"
        "left   right"
        "footer footer";
      gap: 0;
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      color: #fff;
      background: #080808;
      position: relative;
      overflow: hidden;
    }

    /* 背景 */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
    }
    body > * { position: relative; z-index: 1; }

    /* スキャンライン演出 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ヘッダー */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid #ffd70033;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      color: #ffd700;
      text-shadow: 0 0 20px #ffd700aa, 0 0 40px #ffd70044;
    }

    #top-controls {
      display: flex;
      gap: 10px;
    }
    #bg-upload-label, #fullscreen-btn {
      padding: 7px 16px;
      background: rgba(255,215,0,0.08);
      border: 1px solid #ffd70044;
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      color: #ffd700aa;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    #bg-upload-label:hover, #fullscreen-btn:hover {
      background: rgba(255,215,0,0.18);
      color: #ffd700;
      border-color: #ffd700aa;
    }
    #bg-file { display: none; }

    /* 左エリア：メイン数字 */
    #left {
      grid-area: left;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 28px;
    }

    #stage {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 回転する外枠 */
    #stage-ring {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: 3px solid transparent;
      background: linear-gradient(#080808, #080808) padding-box,
                  conic-gradient(from var(--angle, 0deg), #ffd700, #ff6b00, #ff2d55, #ffd700) border-box;
      animation: spin-border 4s linear infinite;
    }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes spin-border {
      to { --angle: 360deg; }
    }

    #current-number {
      font-size: 10rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 30px #ffd700cc, 0 0 60px #ffd70066;
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
      z-index: 1;
    }

    #current-number.rolling {
      animation: flicker 0.1s infinite;
      color: #ff6b00;
      text-shadow: 0 0 30px #ff6b00cc, 0 0 60px #ff6b0066;
    }

    #current-number.pop {
      animation: reveal 0.6s ease forwards;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.7; }
    }

    @keyframes reveal {
      0%   { transform: scale(1.4); opacity: 0; color: #fff; text-shadow: 0 0 60px #fffcc, 0 0 120px #ffffff88; }
      40%  { transform: scale(0.9); }
      70%  { transform: scale(1.08); color: #ffd700; }
      100% { transform: scale(1); opacity: 1; color: #ffd700; text-shadow: 0 0 30px #ffd700cc, 0 0 60px #ffd70066; }
    }

    /* ボタン */
    #draw-btn {
      padding: 16px 56px;
      font-size: 1.3rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.2em;
      background: transparent;
      border: 2px solid #ffd700;
      border-radius: 4px;
      color: #ffd700;
      cursor: pointer;
      text-shadow: 0 0 10px #ffd700aa;
      box-shadow: 0 0 20px #ffd70033, inset 0 0 20px #ffd70011;
      transition: all 0.15s;
    }
    #draw-btn:hover:not(:disabled) {
      background: #ffd70022;
      box-shadow: 0 0 40px #ffd70066, inset 0 0 30px #ffd70022;
    }
    #draw-btn:active:not(:disabled) { transform: scale(0.96); }
    #draw-btn:disabled {
      border-color: #444;
      color: #444;
      text-shadow: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    #reset-btn {
      padding: 6px 20px;
      font-size: 0.75rem;
      font-family: inherit;
      letter-spacing: 0.1em;
      background: transparent;
      border: 1px solid #444;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    #reset-btn:hover { border-color: #888; color: #aaa; }

    #counter {
      font-size: 0.85rem;
      color: #ffd70066;
      letter-spacing: 0.1em;
    }

    /* 右エリア：グリッド */
    #right {
      grid-area: right;
      border-left: 1px solid #ffd70022;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    #right h2 {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #ffd70066;
      text-align: center;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }

    .cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 3px;
      background: #111;
      color: #333;
      border: 1px solid #1a1a1a;
      transition: all 0.3s;
    }

    .cell.drawn {
      background: #ffd70022;
      color: #ffd700aa;
      border-color: #ffd70044;
    }

    .cell.latest {
      background: #ffd700;
      color: #000;
      border-color: #ffd700;
      box-shadow: 0 0 8px #ffd700aa;
      animation: cell-pop 0.4s ease;
    }

    @keyframes cell-pop {
      0%   { transform: scale(0.5); }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* フッター */
    footer {
      grid-area: footer;
      text-align: center;
      padding: 10px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: #ffd70022;
      border-top: 1px solid #ffd70011;
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <header>
    <div class="logo">◆ BINGO ◆</div>
    <div id="top-controls">
      <label id="bg-upload-label" for="bg-file">📷 背景変更</label>
      <input type="file" id="bg-file" accept="image/*">
      <button id="fullscreen-btn">⛶ フルスクリーン</button>
    </div>
  </header>

  <div id="left">
    <div id="stage">
      <div id="stage-ring"></div>
      <div id="current-number">?</div>
    </div>
    <button id="draw-btn">DRAW</button>
    <button id="reset-btn">RESET</button>
    <div id="counter">REMAINING <span id="remaining">100</span> / 100</div>
  </div>

  <div id="right">
    <h2>NUMBER BOARD</h2>
    <div id="grid"></div>
  </div>

  <footer>BINGO SYSTEM v2</footer>

  <script>
    const total = 100;
    let pool = [];
    let drawn = [];

    function init() {
      pool = Array.from({ length: total }, (_, i) => i + 1);
      drawn = [];
      document.getElementById('current-number').textContent = '?';
      document.getElementById('remaining').textContent = total;
      document.getElementById('draw-btn').disabled = false;
      renderGrid();
    }

    function draw() {
      if (pool.length === 0) return;

      const idx = Math.floor(Math.random() * pool.length);
      const finalNum = pool.splice(idx, 1)[0];

      const el = document.getElementById('current-number');
      const btn = document.getElementById('draw-btn');
      btn.disabled = true;
      el.classList.remove('pop', 'rolling');

      const duration = 3000;
      const start = performance.now();
      el.classList.add('rolling');

      function rollTick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const interval = 50 + Math.pow(progress, 2.5) * 450;

        el.textContent = Math.floor(Math.random() * total) + 1;

        if (progress < 1) {
          setTimeout(() => rollTick(performance.now()), interval);
        } else {
          el.classList.remove('rolling');
          void el.offsetWidth;
          el.classList.add('pop');
          el.textContent = finalNum;
          setTimeout(() => el.classList.remove('pop'), 600);

          drawn.unshift(finalNum);
          document.getElementById('remaining').textContent = pool.length;
          renderGrid();

          if (pool.length > 0) btn.disabled = false;
        }
      }

      rollTick(performance.now());
    }

    function renderGrid() {
      const container = document.getElementById('grid');
      container.innerHTML = '';
      for (let i = 1; i <= total; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.textContent = i;
        if (drawn[0] === i) div.classList.add('latest');
        else if (drawn.includes(i)) div.classList.add('drawn');
        container.appendChild(div);
      }
    }

    // 背景
    document.getElementById('bg-file').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      document.getElementById('bg').style.backgroundImage = `url(${URL.createObjectURL(file)})`;
    });

    // ボタン
    document.getElementById('draw-btn').addEventListener('click', draw);
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (confirm('リセットしますか？')) init();
    });

    // フルスクリーン
    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange', () => {
      fsBtn.textContent = document.fullscreenElement ? '✕ 解除' : '⛶ フルスクリーン';
    });

    init();
  </script>
</body>
</html>
