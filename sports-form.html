<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-boost スポーツ大会 参加申し込み</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      background: white;
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      background: #dc2626;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    .logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 0.2rem;
    }

    .logo p {
      font-size: 0.9rem;
      color: #6b7280;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.25rem 0;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    label .required {
      color: #ef4444;
      margin-left: 2px;
    }

    input, select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      background: white;
    }

    input:focus, select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    .btn:hover { background: #3730a3; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
    }

    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .success h2 { font-size: 1.3rem; color: #111827; margin-bottom: 0.5rem; }
    .success p { color: #6b7280; font-size: 0.9rem; line-height: 1.6; }

    .back-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.25rem;
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .note {
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
      margin-top: 1rem;
    }

    .error-msg {
      display: none;
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- フォーム -->
    <div id="form-section">
      <div class="logo">
        <span class="badge">🏆 スポーツ大会</span>
        <p>参加申し込みフォーム</p>
      </div>

      <hr class="divider">

      <div class="form-group">
        <label>学籍番号<span class="required">*</span></label>
        <input type="text" id="f-student-id" placeholder="例：MR1111" maxlength="20">
      </div>

      <div class="form-group">
        <label>氏名<span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="例：駒澤 太郎">
      </div>

      <div class="form-group">
        <label>学年<span class="required">*</span></label>
        <select id="f-grade">
          <option value="">選択してください</option>
          <option value="1年">1年</option>
          <option value="2年">2年</option>
          <option value="3年">3年</option>
          <option value="4年">4年</option>
        </select>
      </div>

      <div class="form-group">
        <label>性別<span class="required">*</span></label>
        <select id="f-gender">
          <option value="">選択してください</option>
          <option value="男性">男性</option>
          <option value="女性">女性</option>
        </select>
      </div>

      <button class="btn" id="submit-btn" onclick="submitForm()">申し込む</button>
      <p class="note">入力内容はサークル運営のみが管理します</p>
    </div>

    <!-- 完了画面 -->
    <div class="success" id="success-section">
      <div class="success-icon">✅</div>
      <h2>申し込み完了！</h2>
      <p>参加登録ありがとうございます。<br>当日を楽しみにしていてください🎉</p>
      <button class="back-btn" onclick="resetForm()">続けて申し込む</button>
    </div>

  </div>

  <script>
    // ★ ここにGASのWebアプリURLを貼る
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx-9yLXsS1dSfkSn3WnBetxQRPlC7f3xE3AUUC3XqhLlbRf9kRP74RBNdLUFhA4BP-r7g/exec';

    function submitForm() {
      const studentId = document.getElementById('f-student-id').value.trim();
      const name      = document.getElementById('f-name').value.trim();
      const grade     = document.getElementById('f-grade').value;
      const gender    = document.getElementById('f-gender').value;

      if (!studentId) { alert('学籍番号を入力してください'); return; }
      if (!name)      { alert('氏名を入力してください'); return; }
      if (!grade)     { alert('学年を選択してください'); return; }
      if (!gender)    { alert('性別を選択してください'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const params = new URLSearchParams({
        studentId,
        name,
        grade,
        gender,
        timestamp: new Date().toLocaleString('ja-JP')
      });

      fetch(GAS_URL, {
        method: 'POST',
        body: params,
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'ok') {
          document.getElementById('form-section').style.display = 'none';
          document.getElementById('success-section').style.display = 'block';
        } else {
          alert('送信に失敗しました: ' + (data.message || '不明なエラー'));
          btn.disabled = false;
          btn.textContent = '申し込む';
        }
      })
      .catch(() => {
        alert('通信エラーが発生しました。もう一度お試しください。');
        btn.disabled = false;
        btn.textContent = '申し込む';
      });
    }

    function resetForm() {
      document.getElementById('f-student-id').value = '';
      document.getElementById('f-name').value = '';
      document.getElementById('f-grade').selectedIndex = 0;
      document.getElementById('f-gender').selectedIndex = 0;
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = '申し込む';
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('success-section').style.display = 'none';
    }
  </script>
</body>
</html>
